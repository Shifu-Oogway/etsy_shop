# Seven services: db, redis, api, worker, beat, frontend, ollama-proxy note —
# Ollama itself runs natively on Windows for GPU access; the stack reaches it
# via host.docker.internal. The seventh service (migrate) runs Alembic once
# with FULL output (never suppress migration logs).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-etsy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etsy}
      POSTGRES_DB: ${POSTGRES_DB:-etsy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etsy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./backend
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - generated:/srv/backend/generated_products
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/system/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=INFO --concurrency=2
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - generated:/srv/backend/generated_products
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=INFO
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  pgdata:
  generated:
